# -----------------------------------------------
# Actuator - Health Check for Render
# -----------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.db.enabled=false

# -----------------------------------------------
# Server Port (Render sets PORT automatically)
# -----------------------------------------------
server.port=${PORT:10000}

# -----------------------------------------------
# Graceful Shutdown - CRITICAL for Render
# -----------------------------------------------
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=1
server.tomcat.accept-count=5

# -----------------------------------------------
# Database Configuration
# Uses PostgreSQL if DB_URL is set, otherwise H2 in-memory
# -----------------------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:mem:hotel}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=false
spring.datasource.hikari.auto-commit=true

# -----------------------------------------------
# JPA / Hibernate - Optimized for faster startup and performance
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# -----------------------------------------------
# Connection Pool - Optimized for Render free tier
# -----------------------------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.auto-commit=true

# -----------------------------------------------
# JWT
# -----------------------------------------------
jwt.secret=${JWT_SECRET:ChandraResidency@Hotel#Secret2024!}
jwt.expiration.ms=${JWT_EXPIRATION:3600000}