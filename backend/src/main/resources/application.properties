# -----------------------------------------------
# Actuator - Health Check for Render
# -----------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.db.enabled=false

# -----------------------------------------------
# Server Port (Render sets PORT automatically)
# -----------------------------------------------
server.port=${PORT:10000}

# -----------------------------------------------
# Graceful Shutdown - CRITICAL for Render
# -----------------------------------------------
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# -----------------------------------------------
# Database Configuration
# Uses PostgreSQL if DB_URL is set, otherwise H2 in-memory
# -----------------------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:mem:hotel}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.h2.console.enabled=false
spring.datasource.hikari.auto-commit=true

# -----------------------------------------------
# JPA / Hibernate - Optimized for faster startup
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# -----------------------------------------------
# Connection Pool - Optimized for Render free tier
# -----------------------------------------------
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=30000

# -----------------------------------------------
# JWT
# -----------------------------------------------
jwt.secret=${JWT_SECRET:ChandraResidency@Hotel#Secret2024!}
jwt.expiration.ms=${JWT_EXPIRATION:3600000}