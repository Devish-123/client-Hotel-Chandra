# -----------------------------------------------
# Server Port (Render sets PORT automatically)
# -----------------------------------------------
server.port=${PORT:10000}

# -----------------------------------------------
# PostgreSQL Configuration
# -----------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# -----------------------------------------------
# JPA / Hibernate - Optimized for faster startup
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# -----------------------------------------------
# Connection Pool - Smaller for free tier
# -----------------------------------------------
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# -----------------------------------------------
# JWT
# -----------------------------------------------
jwt.secret=${JWT_SECRET:ChandraResidency@Hotel#Secret2024!}
jwt.expiration.ms=${JWT_EXPIRATION:3600000}