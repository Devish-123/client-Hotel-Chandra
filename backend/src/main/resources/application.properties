# -----------------------------------------------
# Server Port (Render sets PORT automatically)
# -----------------------------------------------
server.port=${PORT:10000}

# -----------------------------------------------
# PostgreSQL Configuration - With Defaults for Startup
# -----------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hotel}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.hikari.auto-commit=true

# -----------------------------------------------
# JPA / Hibernate - Optimized for faster startup
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# -----------------------------------------------
# Connection Pool - Smaller for free tier
# -----------------------------------------------
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# -----------------------------------------------
# Graceful Shutdown - Required for Render
# -----------------------------------------------
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# -----------------------------------------------
# Health Check Endpoint (Render uses this)
# -----------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# -----------------------------------------------
# JWT
# -----------------------------------------------
jwt.secret=${JWT_SECRET:ChandraResidency@Hotel#Secret2024!}
jwt.expiration.ms=${JWT_EXPIRATION:3600000}